<div class="row">
  <div class="col-md-12">

    <!-- Instruction or statement (if present) -->
    {% if context_text %}
      <div name="context_text" class="instance">
        <div name="instance_text">
          {{ context_text | safe }}
        </div>
      </div>
      <div style="height: 20px;" />
    {% endif %}

    <!-- Two side-by-side text columns -->
    <div class="row">
      <div class="col-md-6">
        <div name="text_A" class="instance" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background-color: #fafafa;">
          <h4 style="text-align:center;">Text A</h4>
          <div name="instance_text">
            {{ instance.text_A | safe }}
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div name="text_B" class="instance" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background-color: #fafafa;">
          <h4 style="text-align:center;">Text B</h4>
          <div name="instance_text">
            {{ instance.text_B | safe }}
          </div>
        </div>
      </div>
    </div>

    <div style="height: 25px;" />

    <!-- Annotation controls -->
    <div class="col-md-12">
      <div class="annotation_schema" style="text-align:center;">
        {{ annotation_schematic }}
      </div>
    </div>

  </div>
</div>
