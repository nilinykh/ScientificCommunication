    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="content-type" content="text/html;charset=UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        .row {
            display: flex;
            flex-direction: column;
        }


        /*                 border:1px solid black;
            border-radius: 5px; */


        /* Create two equal columns that sits next to each other */
        .column {
            flex: 1; /* each column takes equal space */
            min-width: 0; /* prevents overflow */
            padding: 15px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
        }

        .input[type="text"] {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            width: 100%;
        }

        .text-box-container {
            display: flex;
            justify-content: space-between;
            gap: 20px; /* space between boxes */
            margin-top: 10px;
        }

        .text-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-half {
            width: 100%;
            padding: 8px;
            font-size: 11pt;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .input {
            margin: 5px;
        }

        .instance {
            background-color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 15px;
            display: block;
            justify-content: center;
            width: fit-content;
            max-width: 80%;
            text-align: left;
            margin: 0 auto;
            font-size: 11pt;
        }

        .instance p {
            font-weight: bold;
            display: block;
        }


        .annotation_schema > * {
            flex: 1 1 50%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 11pt;
        }

        /* Note: "fieldset" and "legend" are HTML elements, not classes */
        fieldset {

            font-size: 11pt;
        }

        legend {
            font-size: 11pt;
            font-weight: normal;
        }

        /* Input fields inside annotation block */
        input[type="text"] {
            box-sizing: border-box;
            width: 100%;
            font-size: 11pt;
        }

        /* Likert scale labels */
        .likert li {
            float: left;
            list-style-type: none;
            margin-right: 15px;
            font-size: 11pt;
        }

        /* The sidepanel menu */
        .sidepanel {
            min-height: 250px; /* Specify a height */
            width: 0; /* 0 width - change this with JavaScript */
            position: fixed; /* Stay in place */
            z-index: 1; /* Stay on top */
            top: 95px;
            left: 1px;
            background-color: #111; /* Black*/
            overflow-x: hidden; /* Disable horizontal scroll */
            padding-top: 10px; /* Place content 60px from the top */
            padding-bottom: 20px;
            transition: 0.5s; /* 0.5 second transition effect to slide in the sidepanel */
        }

        /* The sidepanel links */
        .sidepanel a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 55px;
            color: #ffffff; /* #818181; */
            display: block;
            transition: 0.3s;
        }

        /* When you mouse over the navigation links, change their color */
        .sidepanel a:hover {
            color: #f1f1f1;
        }

        /* When you mouse over the navigation links, change their color */
        .sidepanel table {
            color: #ffffff;
            font-size: 20px;
            /*padding: 8px 8px 18px 62px;*/
            margin-left: 20px;
            margin-top: 10px;
            border-spacing: 10px;
        }

        .sidepanel td, th {
            color: #ffffff;
            padding: 5px;
        }

        .sidepanel tr:nth-child(even) {
            background-color: #333333;
        }


        /* Position and style the close button (top right corner) */
        .sidepanel .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* Style the button that is used to open the sidepanel */
        .openbtn {
            cursor: pointer;
            /*
            font-size: 20px;
            background-color: #111;
            color: white;
            padding: 10px 15px;
            border: none;*/
        }

        .openbtn:hover {
            background-color: #444;
        }

        /* The instructions */
        .instructions {
            /* width: 0; */ /* 0 width - change this with JavaScript */
            transition: 0.5s; /* 0.5 second transition effect to slide in the sidepanel */
            overflow-y: hidden; /* Disable horizontal scroll */
            border: 1px solid #070707;
            background-color: cccccc;
            border-radius: 5px;
            padding: 15px;
            display: block;
            justify-content: center;
            width: fit-content;
            max-width: 80%;
            text-align: left;
            margin: 0 auto;
            font-size: 11pt;
        }


        /* Position and style the close button (top right corner) */
        .instructions .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* Style the button that is used to open the sidepanel */
        .instructions .openbtn {
            cursor: pointer;
            /*
            font-size: 20px;
            background-color: #111;
            color: white;
            padding: 10px 15px;
            border: none;*/
        }

        .span_container {
            border-width: 3px;
            border-style: solid;
            border: 2px solid black;
            position: relative;
            border-radius: 5px;
            padding: 2px 5px;
            background-color: pink;
        }

        .span_label {
            position: absolute;
            top: -12px;
            left: 5px;
            font-size: 7px;
            padding: 1px 1px;
            border-radius: 3px;
            background-color: pink;
            border: 2px solid red;
            text-align: center;
        }

        .annotation_container {
            display: flex; /* Use flexbox for layout */
            justify-content: space-between; /* Space out the question and the scale */
            align-items: center; /* Center align items vertically */
            width: 100%; /* Make the container full width */
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
            padding: 10px; /* Add padding inside the container */
            margin-bottom: 20px;
            background-color: #ECEFF1; /* Add space between each set of question and likert scale */
        }

        .question {
            flex: 2; /* Allow the question text to take up twice as much space as the likert scale */
            text-align: left; /* Align the text to the left */
            margin-right: 10px; /* Add some space between the question and the Likert scale */
            white-space: normal; /* Allow text to wrap */
            word-wrap: break-word; /* Break the word to prevent overflow */
        }

        .likert {
            flex: 1; /* Set the likert scale to take the remaining space */
            display: flex; /* Use flexbox for the radio buttons */
            justify-content: flex-end; /* Align radio buttons to the end (right side) */
        }

        .likert label {
            /* Adjust label styling as needed */
            margin-left: 5px; /* For space between radio button and label */
        }

        .likert input[type="radio"] {
            /* Adjust radio button styling as needed */
        }

        /* You might want to make sure the labels ("strongly disagree" and "strongly agree") are visible */
        .min-label, .max-label {
            display: inline-block; /* This ensures labels don't get cut off */
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
